<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" preserveAspectRatio="xMidYMid slice">
  <!--
    Tileable paper-grain texture used as the game card background.
    Reproduces the "gray-texture 2" pattern from the Figma design:
    warm off-white base with a fine fractal-noise speckle overlay.
    stitchTiles="stitch" makes the noise seamless when repeated.
  -->
  <defs>
    <filter id="paperGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.42
                             0 0 0 0 0.40
                             0 0 0 0 0.36
                             0 0 0 0.18 0"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f7f6f3"/>
  <rect width="100%" height="100%" filter="url(#paperGrain)" opacity="0.45"/>
</svg>
